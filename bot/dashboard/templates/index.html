<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Music Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #16213e; border-radius: 12px; padding: 40px 60px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    h1 { font-size: 2rem; margin-bottom: 8px; color: #7289da; }
    p { color: #aaa; margin-bottom: 24px; }
    a.btn { display: inline-block; background: #7289da; color: #fff; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: background 0.2s; }
    a.btn:hover { background: #5b6eae; }
  </style>
</head>
<body>
  <div class="card">
    <h1 aria-label="Discord Music Bot"><span aria-hidden="true">🎵</span> Discord Music Bot</h1>
    <p>A feature-rich music bot for your Discord server.</p>
    <a class="btn" href="/auth/discord">Login with Discord</a>
  </div>
</body>
</html>
