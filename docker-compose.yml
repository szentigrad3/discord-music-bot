services:
  yt-cipher:
    # ghcr.io/kikkia/yt-cipher has no versioned release tags; 'master' is the only available tag.
    # The image uses a distroless base so CMD-SHELL healthchecks are not supported.
    # Lavalink only contacts yt-cipher when deciphering track signatures, so it does not
    # need yt-cipher to be fully ready before it starts.
    image: ghcr.io/kikkia/yt-cipher:master
    pull_policy: always # Always pull to get the latest YouTube cipher solutions.
    restart: unless-stopped
    expose:
      - "8001"
    labels:
      # Allow Watchtower to auto-update yt-cipher when a new image is published.
      # yt-cipher releases fixes for YouTube player script changes by rebuilding :master.
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    # Watches only services labelled com.centurylinklabs.watchtower.enable=true (i.e. yt-cipher).
    # Checks for a new image every 24 hours and restarts the container if one is found.
    # This ensures yt-cipher picks up cipher fixes without requiring a manual restart.
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --interval 86400

  lavalink:
    build:
      context: ./lavalink
      dockerfile: ./Dockerfile-lavalink
    restart: unless-stopped
    environment:
      - _JAVA_OPTIONS=-Xmx1G
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=youshallnotpass
      - SPRING_CONFIG_LOCATION=file:/opt/lavalink/application.docker.yml
      # Quoted because the trailing colon would otherwise be parsed as a YAML mapping key.
      - "SPRING_CONFIG_IMPORT=optional:configserver:"
    volumes:
      - ./lavalink:/opt/lavalink
    expose:
      - "2333"
    depends_on:
      - yt-cipher
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2333"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  bot:
    build: .
    restart: unless-stopped
    environment:
      - BOT_IN_DOCKER=true
    volumes:
      - ./data:/app/data
      - ./settings.json:/app/settings.json
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      lavalink:
        condition: service_healthy

