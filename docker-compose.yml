services:
  yt-cipher:
    # ghcr.io/kikkia/yt-cipher has no versioned release tags; 'master' is the only available tag.
    # The image uses a distroless base so CMD-SHELL healthchecks are not supported.
    # Lavalink only contacts yt-cipher when deciphering track signatures, so it does not
    # need yt-cipher to be fully ready before it starts.
    image: ghcr.io/kikkia/yt-cipher:master
    pull_policy: always # Always pull to get the latest YouTube cipher solutions.
    restart: unless-stopped
    expose:
      - "8001"
    labels:
      # Allow Watchtower to auto-update yt-cipher when a new image is published.
      # yt-cipher releases fixes for YouTube player script changes by rebuilding :master.
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    # Watches services labelled com.centurylinklabs.watchtower.enable=true (yt-cipher and lavalink).
    # Checks for a new image every 24 hours and restarts the container if one is found.
    # This ensures yt-cipher picks up cipher fixes and lavalink picks up new releases automatically.
    image: containrrr/watchtower:latest
    restart: unless-stopped
    environment:
      # Without this, Watchtower negotiates Docker API 1.25, which is rejected by newer
      # Docker daemons that require at least API 1.44.
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --interval 86400

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:latest
    pull_policy: always # Always pull to get the latest Lavalink release.
    restart: unless-stopped
    environment:
      - _JAVA_OPTIONS=-Xmx1G --enable-native-access=ALL-UNNAMED
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=youshallnotpass
      - SPRING_CONFIG_LOCATION=file:/opt/lavalink/application.docker.yml
      # Disables Spring Cloud Config Server discovery entirely.
      # Without this, Lavalink attempts to contact http://localhost:8888 three times at
      # startup and logs "Connection refused" warnings even though the server does not exist.
      - SPRING_CLOUD_CONFIG_ENABLED=false
    volumes:
      - ./lavalink:/opt/lavalink
    expose:
      - "2333"
    depends_on:
      - yt-cipher
    labels:
      # Allow Watchtower to auto-update lavalink when a new image is published.
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      # curl is available in the official Lavalink Docker image
      test: ["CMD-SHELL", "curl -sf http://localhost:2333/version -H \"Authorization: $$LAVALINK_SERVER_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  bot:
    build: .
    restart: unless-stopped
    environment:
      - BOT_IN_DOCKER=true
    volumes:
      - ./data:/app/data
      - ./settings.json:/app/settings.json
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      lavalink:
        condition: service_healthy

