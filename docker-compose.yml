services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    restart: unless-stopped
    env_file: .env
    command: ["python", "-m", "bot.dashboard.app"]
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
